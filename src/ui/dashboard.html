<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Fasting — Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    padding: 32px;
    -webkit-app-region: drag;
  }
  .dashboard {
    max-width: 800px;
    margin: 0 auto;
    -webkit-app-region: no-drag;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid #30363d;
  }
  header h1 { font-size: 20px; color: #f0f6fc; }
  .status-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .status-dot.active { background: #238636; }
  .status-dot.warning { background: #d29922; }
  .status-dot.locked { background: #da3633; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 20px;
  }
  .card h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #8b949e;
    margin-bottom: 12px;
  }
  .stat-value { font-size: 28px; font-weight: 700; color: #f0f6fc; }
  .stat-label { font-size: 13px; color: #8b949e; margin-top: 4px; }

  .bar-chart { margin-top: 16px; }
  .bar-row { display: flex; align-items: center; margin-bottom: 10px; }
  .bar-label { width: 120px; font-size: 13px; color: #8b949e; }
  .bar-track {
    flex: 1; height: 20px; background: #21262d;
    border-radius: 4px; overflow: hidden; margin: 0 10px;
  }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .bar-fill.ai { background: #58a6ff; }
  .bar-fill.social { background: #f0883e; }
  .bar-fill.productive { background: #238636; }
  .bar-fill.entertainment { background: #bc8cff; }
  .bar-fill.other { background: #484f58; }
  .bar-value { font-size: 13px; color: #8b949e; width: 50px; text-align: right; }

  .events-list { margin-top: 16px; }
  .event-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid #21262d;
    font-size: 13px;
  }
  .event-tier {
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .event-tier.tier1 { background: #1f6feb33; color: #58a6ff; }
  .event-tier.tier2 { background: #d2992233; color: #d29922; }
  .event-tier.tier3 { background: #da363333; color: #da3633; }
  .event-time { color: #484f58; }

  .streak-section { text-align: center; padding: 20px; }
  .streak-number { font-size: 42px; font-weight: 800; color: #f0f6fc; }
  .streak-fire { font-size: 24px; }
  .empty-state { text-align: center; padding: 40px; color: #484f58; font-size: 14px; }
</style>
</head>
<body>
<div class="dashboard">
  <header>
    <h1>Digital Fasting</h1>
    <div>
      <span class="status-dot active" id="statusDot"></span>
      <span id="statusText" style="font-size:13px; color:#8b949e;">Monitoring</span>
    </div>
  </header>

  <div class="grid">
    <div class="card">
      <h3>Today's Screen Time</h3>
      <div class="bar-chart" id="barChart"></div>
      <div style="margin-top:12px; font-size:13px; color:#484f58;">
        Total: <span id="totalTime" style="color:#8b949e;">0h 0m</span>
      </div>
    </div>

    <div class="card streak-section">
      <div class="streak-fire">🔥</div>
      <div class="streak-number" id="streakCount">0</div>
      <div class="stat-label">days below digital limit</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:20px;">
    <h3>Recent Fatigue Events</h3>
    <div class="events-list" id="eventsList">
      <div class="empty-state">No fatigue events recorded yet</div>
    </div>
  </div>

  <div style="text-align:center; padding:24px;">
    <button style="background:#21262d; border:1px solid #30363d; color:#c9d1d9;
                   padding:8px 20px; border-radius:6px; font-size:13px; cursor:pointer;"
            onclick="window.close()">
      Close Dashboard
    </button>
  </div>
</div>

<script>
  function updateStats(data) {
    if (!data) return;

    const { stats, streak, events } = data;

    // Status dot
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    if (stats.locked) {
      dot.className = 'status-dot locked';
      text.textContent = 'Locked';
    } else if (stats.ai_time_minutes > 100) {
      dot.className = 'status-dot warning';
      text.textContent = 'High Usage';
    } else {
      dot.className = 'status-dot active';
      text.textContent = 'Monitoring';
    }

    // Bar chart
    const categories = [
      { key: 'ai_time_minutes', label: 'AI Tools', cls: 'ai', limit: 120 },
      { key: 'social_time_minutes', label: 'Social', cls: 'social', limit: 180 },
      { key: 'productive_time_minutes', label: 'Productive', cls: 'productive', limit: 480 },
      { key: 'entertainment_time_minutes', label: 'Entertainment', cls: 'entertainment', limit: 180 },
      { key: 'other_time_minutes', label: 'Other', cls: 'other', limit: 240 },
    ];

    let totalMin = 0;
    const barHtml = categories.map(c => {
      const val = stats[c.key] || 0;
      totalMin += val;
      const pct = Math.min(val / c.limit * 100, 100);
      const h = Math.floor(val / 60);
      const m = val % 60;
      const display = val > 0 ? `${h}h ${m}m` : '0m';
      return `<div class="bar-row">
        <span class="bar-label">${c.label}</span>
        <div class="bar-track"><div class="bar-fill ${c.cls}" style="width:${pct}%"></div></div>
        <span class="bar-value">${display}</span>
      </div>`;
    }).join('');

    document.getElementById('barChart').innerHTML = barHtml;
    const th = Math.floor(totalMin / 60);
    const tm = totalMin % 60;
    document.getElementById('totalTime').textContent = `${th}h ${tm}m`;

    // Streak
    document.getElementById('streakCount').textContent = streak || 0;

    // Events
    if (events && events.length) {
      const evtHtml = events.map(e => `
        <div class="event-item">
          <span class="event-tier tier${e.event_type.replace('tier','')}">${e.event_type.toUpperCase()}</span>
          <span style="color:#8b949e;">score: ${e.fatigue_score.toFixed(2)}</span>
          <span class="event-time">${e.resolved ? 'resolved' : 'active'}</span>
        </div>
      `).join('');
      document.getElementById('eventsList').innerHTML = evtHtml;
    }
  }

  // Initial empty state
  updateStats({
    stats: {
      ai_time_minutes: 0, social_time_minutes: 0,
      productive_time_minutes: 0, entertainment_time_minutes: 0,
      other_time_minutes: 0, locked: false
    },
    streak: 0,
    events: []
  });
</script>
</body>
</html>
